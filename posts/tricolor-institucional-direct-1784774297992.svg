<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e30613"/>
      <stop offset="100%" stop-color="#b30000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="1080" height="80" fill="url(#redGrad)"/>
  <text x="540" y="52" font-family="Arial Black, Arial, sans-serif" font-size="32" fill="white" text-anchor="middle" font-weight="bold">⚠️ A VERDADE DO JOGO</text>

  <!-- Score section -->
  <rect x="60" y="110" width="960" height="200" rx="16" fill="#16213e" stroke="#e30613" stroke-width="2"/>

  <!-- SPFC logo placeholder -->
  <rect x="120" y="140" width="80" height="80" rx="40" fill="white"/>
  <text x="160" y="195" font-family="Arial" font-size="14" fill="#1a1a2e" text-anchor="middle" font-weight="bold">SPFC</text>

  <!-- Score -->
  <text x="340" y="210" font-family="Arial Black, Arial, sans-serif" font-size="72" fill="white" text-anchor="middle" font-weight="bold">1</text>
  <text x="540" y="195" font-family="Arial" font-size="28" fill="#e30613" text-anchor="middle" font-weight="bold">x</text>
  <text x="740" y="210" font-family="Arial Black, Arial, sans-serif" font-size="72" fill="white" text-anchor="middle" font-weight="bold">2</text>

  <!-- Athletico logo placeholder -->
  <rect x="880" y="140" width="80" height="80" rx="40" fill="white"/>
  <text x="920" y="195" font-family="Arial" font-size="12" fill="#1a1a2e" text-anchor="middle" font-weight="bold">CAP</text>

  <!-- Goal scorers -->
  <text x="540" y="260" font-family="Arial" font-size="20" fill="#aaa" text-anchor="middle">Arthur 19' ⚽  |  Leozinho 46', 51'</text>

  <!-- Stats section -->
  <rect x="60" y="330" width="960" height="280" rx="16" fill="#16213e" stroke="#333" stroke-width="1"/>
  <text x="540" y="370" font-family="Arial" font-size="22" fill="#e30613" text-anchor="middle" font-weight="bold">📊 ESTATÍSTICAS</text>

  <!-- Stats bars -->
  <text x="90" y="420" font-family="Arial" font-size="18" fill="white" font-weight="bold">Posse:</text>
  <rect x="200" y="405" width="400" height="20" rx="4" fill="#e30613"/>
  <rect x="600" y="405" width="200" height="20" rx="4" fill="#444"/>
  <text x="820" y="420" font-family="Arial" font-size="18" fill="white">67% vs 33%</text>

  <text x="90" y="460" font-family="Arial" font-size="18" fill="white" font-weight="bold">Chutes:</text>
  <rect x="200" y="445" width="360" height="20" rx="4" fill="#e30613"/>
  <rect x="560" y="445" width="240" height="20" rx="4" fill="#444"/>
  <text x="820" y="460" font-family="Arial" font-size="18" fill="white">18 vs 11</text>

  <text x="90" y="500" font-family="Arial" font-size="18" fill="white" font-weight="bold">Chutes a gol:</text>
  <rect x="200" y="485" width="200" height="20" rx="4" fill="#e30613"/>
  <rect x="400" y="485" width="200" height="20" rx="4" fill="#444"/>
  <text x="820" y="500" font-family="Arial" font-size="18" fill="white">3 vs 3</text>

  <text x="90" y="540" font-family="Arial" font-size="18" fill="white" font-weight="bold">Passes:</text>
  <rect x="200" y="525" width="480" height="20" rx="4" fill="#e30613"/>
  <rect x="680" y="525" width="120" height="20" rx="4" fill="#444"/>
  <text x="820" y="540" font-family="Arial" font-size="18" fill="white">587 vs 221</text>

  <!-- Comment section -->
  <rect x="60" y="630" width="960" height="340" rx="16" fill="#16213e" stroke="#333" stroke-width="1"/>

  <text x="540" y="675" font-family="Arial" font-size="20" fill="#e30613" text-anchor="middle" font-weight="bold">💬 ANÁLISE</text>

  <text x="90" y="715" font-family="Arial" font-size="18" fill="white">• Primeiro tempo razoável, mas virada em 5 min no 2º</text>
  <text x="90" y="750" font-family="Arial" font-size="18" fill="white">• Apagão de 15 min no início do segundo tempo</text>
  <text x="90" y="785" font-family="Arial" font-size="18" fill="white">• Alterações melhoraram, mas time não finaliza</text>
  <text x="90" y="820" font-family="Arial" font-size="18" fill="white">• Sem entrosamento — parecem jogar junto pela 1ª vez</text>
  <text x="90" y="855" font-family="Arial" font-size="18" fill="white">• Luciano apagado, Arthur superado fisicamente</text>
  <text x="90" y="900" font-family="Arial" font-size="18" fill="#e30613" font-weight="bold">• Domínio estatístico, mas mesma ineficiência de sempre</text>

  <!-- Footer -->
  <text x="540" y="1040" font-family="Arial" font-size="20" fill="#666" text-anchor="middle">@consciencia_tricolor  •  #SPFC #Brasileirão2026</text>
</svg>